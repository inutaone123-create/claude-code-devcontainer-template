# YAML タスクキュー
# 並列エージェント実行時のタスク管理ファイル
#
# 使い方:
#   1. shogun/karo がタスクを分解してここに記録する
#   2. 各エージェントは自分のタスクを in_progress → done に更新する
#   3. blocked_by に依存タスクのIDを列挙すると順序制御できる
#
# status: waiting | in_progress | done | failed

session:
  id: "{{SESSION_ID}}"          # 例: 2026-03-08-001
  started_at: "{{DATETIME}}"
  goal: "{{GOAL_DESCRIPTION}}"

tasks: []

